server {
    listen 80;
    listen [::]:80;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-store" always;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:md|ya?ml)$ {
        deny all;
    }
}
