# Project-specific public host config for gaiangrid.com.
# This replaces the generic apex vhost when the Gaian Grid public analytics
# service is enabled on the same EC2 host.
server {
    listen 443 ssl http2;
    server_name gaiangrid.com;

    ssl_certificate     /etc/letsencrypt/live/gaiangrid.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaiangrid.com/privkey.pem;

    root /srv/telemetry_website/src;
    index index.html;

    server_tokens off;
    client_max_body_size 32k;
    access_log /var/log/nginx/telemetry.access.log;
    error_log /var/log/nginx/telemetry.error.log warn;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = / {
        try_files /index.html =404;
    }

    location = /health {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/enrollment {
        limit_except POST { deny all; }
        limit_req zone=hub_enrollment burst=5 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/public/ {
        limit_except GET { deny all; }
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /enroll {
        limit_except GET POST { deny all; }
        limit_req zone=portal_request burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /enroll/verify {
        limit_except GET POST { deny all; }
        limit_req zone=portal_verify burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /enroll/ {
        return 301 /enroll;
    }

    location = /enroll/verify/ {
        return 301 /enroll/verify;
    }

    location ^~ /enroll/static/ {
        limit_except GET { deny all; }
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /request-access {
        return 308 /enroll;
    }

    location = /verify {
        return 308 /enroll/verify;
    }

    location ^~ /api/v1/admin/ { return 404; }
    location = /api/v1/sites { return 404; }
    location ^~ /api/v1/sites/ { return 404; }
    location = /api/v1/events/stream { return 404; }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico)$ {
        try_files $uri =404;
    }

    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
